name: Propagate Shared Components

on:
  push:
    branches: [main]
    paths:
      - 'btn-engage.js'
      - 'favicon.svg'
      - 'snippets/**'
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to propagate (all, ga4, footer, btn-engage, favicon)'
        default: 'all'
      dry_run:
        description: 'Dry run (no push)'
        type: boolean
        default: false
      batch_size:
        description: 'Repos per batch'
        default: '50'

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run propagation
        env:
          GH_TOKEN: ${{ secrets.BTN_DEPLOY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          COMPONENT: ${{ inputs.component || 'all' }}
          BATCH_SIZE: ${{ inputs.batch_size || '50' }}
        run: python scripts/propagate.py
